<div class="manga-card">
    <div class="card-cover">
        <img
            [src]="producto.imagen"
            [alt]="producto.nombre"
            referrerpolicy="no-referrer"
            onerror="console.log('Error imagen:', this.src)"
        />
        <div class="card-imagen"></div>
    </div>
    <div class="card-info">
        <span class="card-genero" [ngClass]="'genero-' + (producto.categoria || '').toLowerCase()">
        {{ producto.categoria }}</span>
        <h3>{{ producto.nombre }}</h3>
        <p>{{ producto.editorial }} · Vol. {{ producto.tomo }}</p>
        <p>{{ producto.disponible }} disponibles · {{ producto.stock }} en stock</p>
        <p>{{ truncateWords(producto.descripcion, 7)}}</p>
        <span class="precio">{{ producto.precio | currency:'MXN':'symbol':'1.0-0' }}</span>
        <div class="card-footer">
            <a [routerLink]="['/detalles', producto.id]" [state]="{ producto: producto }" class="btn-small">Ver Más</a>
            <button
                class="btn-small btn-carrito"
                (click)="agregar.emit(producto)"
                [disabled]="producto.disponible === 0"
                [ngClass]="{'agregado': agregadoId === producto.id}">
                {{ agregadoId === producto.id ? 'Agregado' : 'Agregar' }}
            </button>
        </div>
    </div>
</div>
