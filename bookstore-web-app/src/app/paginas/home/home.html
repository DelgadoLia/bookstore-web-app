<div class="home">

  <section class="hero">
    <div class="hero-content">
      <h1>Sumérgete en <br> mundos de tinta</h1>
      <p>Más de 2000 tomos originales, ediciones limitadas y lo último del manga japonés.</p>
      <div class="hero-numeros">
        <div class="numero-item">
          <span class="valores">+2,500</span>
          <span class="numero-label">Mangas</span>
        </div>
        <div class="numero-item">
          <span class="valores">+120</span>
          <span class="numero-label">Autores</span>
        </div>
        <div class="numero-item">
          <span class="valores">4.9</span>
          <span class="numero-label">Valoración</span>
        </div>
      </div>
      <div class="hero-botones">
        <a routerLink="/catalogo" class="btn-primary">Explorar catálogo</a>
        <a routerLink="/contacto" class="btn-ghost">Contáctanos</a>
      </div>
    </div>
    <div class="hero-visual">
  <div class="hero-card">
    <div class="hero-card-portada">
      <img
        *ngIf="heroProducto"
        [src]="heroProducto.imagen"
        [alt]="heroProducto.nombre"
        style="width:100%; height:100%; object-fit:cover; border-radius: inherit;"
      />
    </div>
    <div class="hero-card-tag">Edición limitada</div>
  </div>
</div>
  </section>

  <section class="destacados">
    <h2 class="seccion-titulo">Títulos destacados</h2>
    <p class="seccion-sub">Los más populares de nuestra colección</p>

    <div class="manga-grid">
      <app-producto-card
        *ngFor="let producto of destacados"
        [producto]="producto"
        [agregadoId]="agregadoId"
        (agregar)="agregarAlCarrito($event)">
      </app-producto-card>
    </div>

    <div class="ver-todos">
      <a routerLink="/catalogo" class="btn-primary">Ver todos los mangas</a>
    </div>
  </section>
  

</div>
